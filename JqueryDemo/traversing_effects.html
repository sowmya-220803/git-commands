<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traversing & Effects</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        #effect-box { position: relative; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Traversing & Effects</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="selectors_attributes.html">Selectors & Attributes</a>
                <a href="events_style.html">Events & Style</a>
                <a href="traversing_effects.html">Traversing & Effects</a>
            </nav>
        </header>

        <section class="demo-section">
            <h2>5. DOM Traversing</h2>
            <div id="parent-div" style="padding: 20px; border: 1px solid #ccc;">
                Parent
                <div id="child" style="padding: 10px; border: 1px solid #999;">Child</div>
            </div>
            <ul id="list-parent">
                <li>Item 1</li>
                <li id="mid" class="special">Middle Item</li>
                <li>Item 3</li>
            </ul>
            <button id="btn-parent">Parent()</button>
            <button id="btn-parents">Parents()</button>
            <button id="btn-children">Children()</button>
            <button id="btn-find">Find()</button>
            <button id="btn-sib">Siblings()</button>
            <button id="btn-next">Next()</button>
            <button id="btn-eq">Eq(1)</button>
        </section>

        <section class="demo-section">
            <h2>6 & 7. Effects & Animation</h2>
            <div id="effect-box" class="demo-box">Box</div>
            <div style="margin-top: 10px;">
                <button id="btn-show">Show</button>
                <button id="btn-hide">Hide</button>
                <button id="btn-fade">FadeToggle</button>
                <button id="btn-slide">SlideToggle</button>
                <button id="btn-anim">Custom Anim</button>
                <button id="btn-stop">Stop</button>
                <button id="btn-finish">Finish</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
